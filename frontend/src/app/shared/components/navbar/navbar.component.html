<nav class="bg-white border-b border-gray-200 px-4 md:px-6 py-3 flex items-center justify-between sticky top-0 z-40">

  <!-- Logo + Search -->
  <div class="flex items-center gap-4">
    <a (click)="goHome()" class="flex items-center gap-2 cursor-pointer">
      <span class="text-xl">🧭</span>
      <span class="font-black tracking-widest uppercase text-sm"><span class="text-gray-900">JOB</span><span class="text-red-600">COMPASS</span><span class="text-red-400 text-xs align-super">▲</span></span>
    </a>
    <div class="hidden md:flex items-center border border-gray-200 rounded-full px-3 py-1.5 gap-2 w-56">
      <lucide-icon [img]="Search" [size]="14" class="text-gray-400 shrink-0"></lucide-icon>
      <input type="text" placeholder="Search jobs, skills, companies..."
        class="text-sm outline-none w-full text-gray-600 bg-transparent"
        [(ngModel)]="navSearch" (keyup.enter)="goSearch()" />
    </div>
  </div>

  <!-- Desktop Nav -->
  <div class="hidden md:flex items-center gap-6">

    <ng-container *ngIf="role === 'JOB_SEEKER'">
      <a routerLink="/jobs" routerLinkActive="text-blue-600 border-b-2 border-blue-600"
        class="flex flex-col items-center text-gray-500 hover:text-blue-600 text-xs gap-0.5 pb-1">
        <lucide-icon [img]="Briefcase" [size]="20"></lucide-icon> Jobs
      </a>
      <a routerLink="/jobs/search" routerLinkActive="text-blue-600 border-b-2 border-blue-600"
        class="flex flex-col items-center text-gray-500 hover:text-blue-600 text-xs gap-0.5 pb-1">
        <lucide-icon [img]="Search" [size]="20"></lucide-icon> Search
      </a>
      <a routerLink="/applications" routerLinkActive="text-blue-600 border-b-2 border-blue-600"
        class="flex flex-col items-center text-gray-500 hover:text-blue-600 text-xs gap-0.5 pb-1">
        <lucide-icon [img]="ClipboardList" [size]="20"></lucide-icon> Applications
      </a>
      <a routerLink="/resume" routerLinkActive="text-blue-600 border-b-2 border-blue-600"
        class="flex flex-col items-center text-gray-500 hover:text-blue-600 text-xs gap-0.5 pb-1">
        <lucide-icon [img]="FileText" [size]="20"></lucide-icon> Resume
      </a>
    </ng-container>

    <ng-container *ngIf="role === 'RECRUITER'">
      <a routerLink="/recruiter/dashboard" routerLinkActive="text-blue-600 border-b-2 border-blue-600"
        class="flex flex-col items-center text-gray-500 hover:text-blue-600 text-xs gap-0.5 pb-1">
        <lucide-icon [img]="LayoutDashboard" [size]="20"></lucide-icon> Dashboard
      </a>
      <a routerLink="/recruiter/post-job" routerLinkActive="text-blue-600 border-b-2 border-blue-600"
        class="flex flex-col items-center text-gray-500 hover:text-blue-600 text-xs gap-0.5 pb-1">
        <lucide-icon [img]="PlusCircle" [size]="20"></lucide-icon> Post Job
      </a>
      <a routerLink="/recruiter/my-jobs" routerLinkActive="text-blue-600 border-b-2 border-blue-600"
        class="flex flex-col items-center text-gray-500 hover:text-blue-600 text-xs gap-0.5 pb-1">
        <lucide-icon [img]="Briefcase" [size]="20"></lucide-icon> My Jobs
      </a>
      <a routerLink="/recruiter/applicants/0" routerLinkActive="text-blue-600 border-b-2 border-blue-600"
        class="flex flex-col items-center text-gray-500 hover:text-blue-600 text-xs gap-0.5 pb-1">
        <lucide-icon [img]="Users" [size]="20"></lucide-icon> Applicants
      </a>
    </ng-container>

    <ng-container *ngIf="role === 'ADMIN'">
      <a routerLink="/admin/dashboard" routerLinkActive="text-blue-600 border-b-2 border-blue-600"
        class="flex flex-col items-center text-gray-500 hover:text-blue-600 text-xs gap-0.5 pb-1">
        <lucide-icon [img]="BarChart2" [size]="20"></lucide-icon> Dashboard
      </a>
      <a routerLink="/admin/users" routerLinkActive="text-blue-600 border-b-2 border-blue-600"
        class="flex flex-col items-center text-gray-500 hover:text-blue-600 text-xs gap-0.5 pb-1">
        <lucide-icon [img]="Users" [size]="20"></lucide-icon> Users
      </a>
      <a routerLink="/admin/jobs" routerLinkActive="text-blue-600 border-b-2 border-blue-600"
        class="flex flex-col items-center text-gray-500 hover:text-blue-600 text-xs gap-0.5 pb-1">
        <lucide-icon [img]="Briefcase" [size]="20"></lucide-icon> Jobs
      </a>
    </ng-container>

    <!-- Dark Mode Toggle -->
    <button (click)="toggleDark()"
      class="w-9 h-9 rounded-full flex items-center justify-center border border-gray-200 hover:bg-gray-100 transition">
      <lucide-icon [img]="dark ? Sun : Moon" [size]="16" class="text-gray-600"></lucide-icon>
    </button>

    <!-- User Avatar + Dropdown -->
    <div class="relative navbar-dropdown-wrapper">
      <button (click)="toggleDropdown()"
        class="flex items-center gap-2 hover:bg-gray-50 rounded-full px-2 py-1 transition">
        <div class="w-8 h-8 bg-blue-600 rounded-full flex items-center justify-center text-white text-xs font-bold">
          {{ initials }}
        </div>
        <div class="flex flex-col text-left">
          <span class="text-xs font-semibold text-gray-800">{{ displayName }}</span>
          <span class="text-xs text-gray-400">{{ role }}</span>
        </div>
        <lucide-icon [img]="ChevronDown" [size]="14" class="text-gray-400"></lucide-icon>
      </button>

      <div *ngIf="dropdownOpen"
        class="absolute right-0 mt-2 w-56 bg-white border border-gray-200 rounded-xl shadow-lg z-50 overflow-hidden">
        <div class="px-4 py-3 border-b border-gray-100">
          <p class="text-sm font-semibold text-gray-800">{{ displayName }}</p>
          <p class="text-xs text-gray-400">{{ email }}</p>
        </div>
        <div class="py-1">
          <button *ngIf="role === 'RECRUITER'" (click)="navigate('/recruiter/profile'); closeDropdown()"
            class="w-full text-left px-4 py-2.5 text-sm text-gray-700 hover:bg-gray-50 flex items-center gap-3">
            <lucide-icon [img]="User" [size]="15"></lucide-icon> My Profile
          </button>
          <button *ngIf="role === 'JOB_SEEKER'" (click)="navigate('/profile'); closeDropdown()"
            class="w-full text-left px-4 py-2.5 text-sm text-gray-700 hover:bg-gray-50 flex items-center gap-3">
            <lucide-icon [img]="User" [size]="15"></lucide-icon> My Profile
          </button>
          <button *ngIf="role === 'JOB_SEEKER'" (click)="navigate('/applications'); closeDropdown()"
            class="w-full text-left px-4 py-2.5 text-sm text-gray-700 hover:bg-gray-50 flex items-center gap-3">
            <lucide-icon [img]="ClipboardList" [size]="15"></lucide-icon> My Applications
          </button>
          <button (click)="navigate('/change-password'); closeDropdown()"
            class="w-full text-left px-4 py-2.5 text-sm text-gray-700 hover:bg-gray-50 flex items-center gap-3">
            <lucide-icon [img]="Lock" [size]="15"></lucide-icon> Change Password
          </button>
          <div class="border-t border-gray-100 mt-1"></div>
          <button (click)="confirmLogout(); closeDropdown()"
            class="w-full text-left px-4 py-2.5 text-sm text-red-500 hover:bg-red-50 flex items-center gap-3">
            <lucide-icon [img]="LogOut" [size]="15"></lucide-icon> Sign Out
          </button>
        </div>
      </div>
    </div>

  </div>

  <!-- Mobile Right -->
  <div class="flex md:hidden items-center gap-2">
    <button (click)="toggleDark()"
      class="w-8 h-8 rounded-full flex items-center justify-center border border-gray-200">
      <lucide-icon [img]="dark ? Sun : Moon" [size]="15" class="text-gray-600"></lucide-icon>
    </button>
    <div class="w-8 h-8 bg-blue-600 rounded-full flex items-center justify-center text-white text-xs font-bold">
      {{ initials }}
    </div>
    <button (click)="toggleMobileMenu()"
      class="w-9 h-9 flex items-center justify-center rounded-lg hover:bg-gray-100 transition">
      <lucide-icon [img]="mobileMenuOpen ? X : Menu" [size]="20" class="text-gray-700"></lucide-icon>
    </button>
  </div>

</nav>

<!-- Mobile Menu Drawer -->
<div *ngIf="mobileMenuOpen" class="md:hidden bg-white border-b border-gray-200 px-4 py-3 flex flex-col gap-1 z-30">

  <div class="flex items-center gap-3 px-2 py-3 border-b border-gray-100 mb-2">
    <div class="w-10 h-10 bg-blue-600 rounded-full flex items-center justify-center text-white text-sm font-bold">
      {{ initials }}
    </div>
    <div>
      <p class="text-sm font-semibold text-gray-800">{{ displayName }}</p>
      <p class="text-xs text-gray-400">{{ role }}</p>
    </div>
  </div>

  <ng-container *ngIf="role === 'JOB_SEEKER'">
    <a routerLink="/jobs" (click)="toggleMobileMenu()" class="flex items-center gap-3 px-3 py-2.5 rounded-lg text-sm text-gray-700 hover:bg-gray-50">
      <lucide-icon [img]="Briefcase" [size]="16"></lucide-icon> Jobs
    </a>
    <a routerLink="/jobs/search" (click)="toggleMobileMenu()" class="flex items-center gap-3 px-3 py-2.5 rounded-lg text-sm text-gray-700 hover:bg-gray-50">
      <lucide-icon [img]="Search" [size]="16"></lucide-icon> Search Jobs
    </a>
    <a routerLink="/applications" (click)="toggleMobileMenu()" class="flex items-center gap-3 px-3 py-2.5 rounded-lg text-sm text-gray-700 hover:bg-gray-50">
      <lucide-icon [img]="ClipboardList" [size]="16"></lucide-icon> My Applications
    </a>
    <a routerLink="/resume" (click)="toggleMobileMenu()" class="flex items-center gap-3 px-3 py-2.5 rounded-lg text-sm text-gray-700 hover:bg-gray-50">
      <lucide-icon [img]="FileText" [size]="16"></lucide-icon> Resume
    </a>
    <a routerLink="/profile" (click)="toggleMobileMenu()" class="flex items-center gap-3 px-3 py-2.5 rounded-lg text-sm text-gray-700 hover:bg-gray-50">
      <lucide-icon [img]="User" [size]="16"></lucide-icon> My Profile
    </a>
  </ng-container>

  <ng-container *ngIf="role === 'RECRUITER'">
    <a routerLink="/recruiter/dashboard" (click)="toggleMobileMenu()" class="flex items-center gap-3 px-3 py-2.5 rounded-lg text-sm text-gray-700 hover:bg-gray-50">
      <lucide-icon [img]="LayoutDashboard" [size]="16"></lucide-icon> Dashboard
    </a>
    <a routerLink="/recruiter/post-job" (click)="toggleMobileMenu()" class="flex items-center gap-3 px-3 py-2.5 rounded-lg text-sm text-gray-700 hover:bg-gray-50">
      <lucide-icon [img]="PlusCircle" [size]="16"></lucide-icon> Post Job
    </a>
    <a routerLink="/recruiter/my-jobs" (click)="toggleMobileMenu()" class="flex items-center gap-3 px-3 py-2.5 rounded-lg text-sm text-gray-700 hover:bg-gray-50">
      <lucide-icon [img]="Briefcase" [size]="16"></lucide-icon> My Jobs
    </a>
    <a routerLink="/recruiter/applicants/0" (click)="toggleMobileMenu()" class="flex items-center gap-3 px-3 py-2.5 rounded-lg text-sm text-gray-700 hover:bg-gray-50">
      <lucide-icon [img]="Users" [size]="16"></lucide-icon> Applicants
    </a>
    <a routerLink="/recruiter/profile" (click)="toggleMobileMenu()" class="flex items-center gap-3 px-3 py-2.5 rounded-lg text-sm text-gray-700 hover:bg-gray-50">
      <lucide-icon [img]="User" [size]="16"></lucide-icon> My Profile
    </a>
  </ng-container>

  <div class="border-t border-gray-100 mt-1 pt-1">
    <button (click)="navigate('/change-password'); toggleMobileMenu()" class="w-full flex items-center gap-3 px-3 py-2.5 rounded-lg text-sm text-gray-700 hover:bg-gray-50">
      <lucide-icon [img]="Lock" [size]="16"></lucide-icon> Change Password
    </button>
    <button (click)="confirmLogout(); toggleMobileMenu()" class="w-full flex items-center gap-3 px-3 py-2.5 rounded-lg text-sm text-red-500 hover:bg-red-50">
      <lucide-icon [img]="LogOut" [size]="16"></lucide-icon> Sign Out
    </button>
  </div>
</div>

<app-confirm-modal
  [visible]="showLogoutModal"
  (confirmed)="logout()"
  (cancelled)="showLogoutModal = false">
</app-confirm-modal>
